name: Postman API Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  postman-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Force Node.js 24 for all JS actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: List files in repo root
        run: ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'  # Upgrade from 20 → 24

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman Collection
        run: |
          newman run Fund_Transfer_API_Tests.postman_collection.json \
          -e QA_Environment.postman_environment.json \
          -r cli,html

      - name: Upload Newman HTML Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: newman-html-report
          path: newman-report.html